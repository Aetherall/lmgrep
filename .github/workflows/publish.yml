name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Bump version and publish
        run: |
          set -e

          latest=$(npx --yes npm@latest view lmgrep "dist-tags.latest" 2>/dev/null || echo "0.0.0")
          next=$(echo "$latest" | awk -F'[.-]' '{ print $1 "." $2 "." $3+1 }')

          echo "Latest: $latest -> Next: $next"
          npm pkg set version="$next"

          npx --yes npm@latest publish --provenance --access public
